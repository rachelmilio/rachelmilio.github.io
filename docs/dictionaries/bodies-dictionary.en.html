    [`<div class="terminologyEntry">    <div class="term">Ephetai</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that judges unintentional and justifiable homicide cases, has 51 members, selected from Council of Areopagus, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: ἐφέται (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that judges unintentional and justifiable homicide cases has 51 members selected from Council of Areopagus serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that judges unintentional and justifiable homicide cases/, /has 51 members/, /selected from Council of Areopagus/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/ephetai"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Eponymous Archon</div>    <div class="definitionNL"><b>Definition</b>: Archon that supervises family lawsuits for citizens, held by one person.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Archon (preferred), Magistrate (alternative),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: ἐπώνυμος ἄρχων (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term that supervises family lawsuits for citizens held by one person&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that holds preliminary hearings and schedule cases/, /chosen by lot/, /serves a one year term/, /that supervises family lawsuits for citizens/, /held by one person/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/eponymous-archon"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Forty</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that arbitrates private lawsuits concerning up to 10 drachmas, that supervises private lawsuits of more than 10 drachmas, has 40 members, chosen by lot, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: τετταράκοντα (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that arbitrates private lawsuits concerning up to 10 drachmas that supervises private lawsuits of more than 10 drachmas has 40 members chosen by lot serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that arbitrates private lawsuits concerning up to 10 drachmas/, /that supervises private lawsuits of more than 10 drachmas/, /has 40 members/, /chosen by lot/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/forty"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Generals</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that supervises military related legal proceedings, that commands the military, held by 10 people, elected from each tribe, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: στρατηγοί (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that supervises military related legal proceedings that commands the military held by 10 people elected from each tribe serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that supervises military related legal proceedings/, /that commands the military/, /held by 10 people/, /elected from each tribe/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/generals"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">King</div>    <div class="definitionNL"><b>Definition</b>: Archon that supervises religious suits such as impiety indictments and homicide suits, held by one person.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Basileus (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Archon (preferred), Magistrate (alternative),</i></div>    <div class="textMediumMargin"><b>Status</b>: alternative</div>    <div class="textMediumMargin"><b>See also</b>: Basileus (preferred),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: βασιλεὺς (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term that supervises religious suits such as impiety indictments and homicide suits held by one person&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that holds preliminary hearings and schedule cases/, /chosen by lot/, /serves a one year term/, /that supervises religious suits such as impiety indictments and homicide suits/, /held by one person/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/basileus"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Law courts</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that judges the majority of legal proceedings, has a size that varies based on case, chosen by lot, from male citizens over 30, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Dikasterion (none),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div>    <div class="textMediumMargin"><b>See also</b>: Dikasterion (none),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: δικαστήριον (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that judges the majority of legal proceedings has a size that varies based on case selected from a pool of 6000 chosen by lot from male citizens over 30 serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that judges the majority of legal proceedings/, /has a size that varies based on case selected from a pool of 6000/, /chosen by lot/, /from male citizens over 30/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/law-courts"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Law-Givers</div>    <div class="definitionNL"><b>Definition</b>: Archon that supervises lawsuits against other officials such as impeachments indictments for illegal proposals and scrutinies, held by 6 people.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Thesmothetai (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Archon (preferred), Magistrate (alternative),</i></div>    <div class="textMediumMargin"><b>Status</b>: alternative</div>    <div class="textMediumMargin"><b>See also</b>: Thesmothetai (preferred),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: θεσμοθέται (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term that supervises lawsuits against other officials such as impeachments indictments for illegal proposals and scrutinies held by 6 people&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that holds preliminary hearings and schedule cases/, /chosen by lot/, /serves a one year term/, /that supervises lawsuits against other officials such as impeachments indictments for illegal proposals and scrutinies/, /held by 6 people/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/thesmothetai"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Legal Body</div>    <div class="definitionNL"><b>Definition</b>:  is an office of Athenian law.</div>    <div class="textMediumMarginBlue"><i><u>hyponym(s)</u>: Arbitrators (preferred), Archon (preferred), Assembly (preferred), Auditors (preferred), Council of 500 (preferred), Council of the Areopagus (preferred), Dikasterion (none), Ekklesia (alternative), Eleven (preferred), Ephetai (preferred), Forty (preferred), Generals (preferred), Law courts (preferred), Logistai (alternative), Magistrate (alternative), Presidents (alternative), Prytaneis (preferred), Public advocates (preferred), Special auditors (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: τέλος (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/legal-body"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Logistai</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that examines the financial records of magistrates, that supervises euthanai for embezzlement and bribes, held by 10 people, elected from Council of 500, serves for one tenth of a year.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Auditors (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: alternative</div>    <div class="textMediumMargin"><b>See also</b>: Auditors (preferred),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: λογισταί (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that examines the financial records of magistrates that supervises euthanai for embezzlement and bribes held by 10 people elected from Council of 500 serves for one tenth of a year&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that examines the financial records of magistrates/, /that supervises euthanai for embezzlement and bribes/, /held by 10 people/, /elected from Council of 500/, /serves for one tenth of a year/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/auditors"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Magistrate</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that holds preliminary hearings and schedule cases, chosen by lot, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Archon (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hyponym(s)</u>: Basileus (preferred), Eponymous Archon (preferred), King (alternative), Law-Givers (alternative), Polemarch (preferred), Thesmothetai (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: alternative</div>    <div class="textMediumMargin"><b>See also</b>: Archon (preferred),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: ἄρχων (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that holds preliminary hearings and schedule cases/, /chosen by lot/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/archon"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Polemarch</div>    <div class="definitionNL"><b>Definition</b>: Archon that supervises family law for metics, held by one person.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Archon (preferred), Magistrate (alternative),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: πολέμαρχος (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term that supervises family law for metics held by one person&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that holds preliminary hearings and schedule cases/, /chosen by lot/, /serves a one year term/, /that supervises family law for metics/, /held by one person/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/polemarch"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Presidents</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that convenes Council and Assembly, has 50 members, made up of council members in an order determined by lot, serves for one tenth of a year.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Prytaneis (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: alternative</div>    <div class="textMediumMargin"><b>See also</b>: Prytaneis (preferred),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: πρυτάνεις (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that convenes Council and Assembly has 50 members made up of council members in an order determined by lot serves for one tenth of a year&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that convenes Council and Assembly/, /has 50 members/, /made up of council members in an order determined by lot/, /serves for one tenth of a year/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/prytaneis"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Prytaneis</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that convenes Council and Assembly, has 50 members, made up of council members in an order determined by lot, serves for one tenth of a year.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Presidents (alternative),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div>    <div class="textMediumMargin"><b>See also</b>: Presidents (alternative),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: πρυτάνεις (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that convenes Council and Assembly has 50 members made up of council members in an order determined by lot serves for one tenth of a year&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that convenes Council and Assembly/, /has 50 members/, /made up of council members in an order determined by lot/, /serves for one tenth of a year/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/prytaneis"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Public advocates</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that prosecutes euthanai brought forward by logistai, held by 10 people, chosen by lot, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: συνήγοροι (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that prosecutes euthanai brought forward by logistai held by 10 people chosen by lot serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that prosecutes euthanai brought forward by logistai/, /held by 10 people/, /chosen by lot/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/public-advocates"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Special auditors</div>    <div class="definitionNL"><b>Definition</b>: Legal Body that supervises euthanai initiated by public, held by 10 people, chosen by lot, serves a one year term.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Legal Body (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: εὔθυνοι (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that supervises euthanai initiated by public held by 10 people chosen by lot serves a one year term&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that supervises euthanai initiated by public/, /held by 10 people/, /chosen by lot/, /serves a one year term/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/special-auditors"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">Thesmothetai</div>    <div class="definitionNL"><b>Definition</b>: Archon that supervises lawsuits against other officials such as impeachments indictments for illegal proposals and scrutinies, held by 6 people.</div>    <div class="textMediumMarginBlue"><i><u>synonym(s)</u>: Law-Givers (alternative),</i></div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: Archon (preferred), Magistrate (alternative),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div>    <div class="textMediumMargin"><b>See also</b>: Law-Givers (alternative),     </div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: θεσμοθέται (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term that supervises lawsuits against other officials such as impeachments indictments for illegal proposals and scrutinies held by 6 people&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an office of Athenian law/, /that holds preliminary hearings and schedule cases/, /chosen by lot/, /serves a one year term/, /that supervises lawsuits against other officials such as impeachments indictments for illegal proposals and scrutinies/, /held by 6 people/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal_Body that holds preliminary hearings and schedule cases chosen by lot serves a one year term&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/bodies-dictionary/thesmothetai"> > Entry Page</a></div></div>`],
];
function show_selected() {
    var selector = document.getElementById('idTerm');
    var champ = dictionnaire[selector[selector.selectedIndex].value][0];
    document.getElementById('display').innerHTML = champ;
}
document.getElementById('idTerm').addEventListener('change', show_selected);

searchBox = document.querySelector("#searchBox");
entries = document.querySelector("#idTerm");
var when = "keyup"; //You can change this to keydown, keypress or change

searchBox.addEventListener("keyup", function (e) {
    var text = e.target.value;
    var options = entries.options;
    for (var i = 0; i < options.length; i++) {
        var option = options[i];
        var optionText = option.text;
        var lowerOptionText = optionText.toLowerCase();
        var lowerText = text.toLowerCase();
        var regex = new RegExp("^" + text, "i");
        var match = optionText.match(regex);
        var contains = lowerOptionText.indexOf(lowerText) != -1;
        if (match || contains) {
            option.selected = true;
            show_selected();
            return;
        }
        searchBox.selectedIndex = 0;
    }
});

</script>
