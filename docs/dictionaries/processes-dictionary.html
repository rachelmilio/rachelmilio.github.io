    [`<div class="terminologyEntry">    <div class="term">appeal</div>    <div class="definitionNL"><b>Definition</b>: Lawsuit to overturn decision of a magistrate, supervised by the Thesmothetai, tried by the dikasterion.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: lawsuit (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: ἔφεσις (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding to overturn decision of a magistrate supervised by the Thesmothetai tried by the dikasterion&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /to overturn decision of a magistrate/, /supervised by the Thesmothetai/, /tried by the dikasterion/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal proceeding&gt;</div></div><div class="conceptEntry">    <div class= "externalLink">rdfs:seeAlso <a href="https://www.wikidata.org/wiki/Q113646374" target="_blank" rel="noopener">https://www.wikidata.org/wiki/Q113646374</a></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/processes-dictionary/appeal"> > Entry Page</a></div></div>`],

    [`<div class="terminologyEntry">    <div class="term">battery suit</div>    <div class="definitionNL"><b>Definition</b>: Private lawsuit for starting a physical fight without justification, defendant summoned by plaintiff via prosklesis, initiated by submitting a charge in writing to magistrate, supervised by the Forty, tried by the dikasterion, has punishment for convicted of an assessable fine, has penalty of epobelia for failed prosecution, with assessable penalty through timesis.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: assessable lawsuit (preferred), private lawsuit (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: αἰκίας δίκη (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding brought forward by the injured party or a guardian with a prosecutor and defendant for starting a physical fight without justification defendant summoned by plaintiff via prosklesis initiated by submitting a charge in writing to magistrate supervised by the Forty tried by the dikasterion has punishment for convicted of an assessable fine has penalty of epobelia for failed prosecution with assessable penalty through timesis&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /with assessable penalty through timesis/, /brought forward by the injured party or a guardian/, /with a prosecutor and defendant/, /for starting a physical fight without justification/, /defendant summoned by plaintiff via prosklesis/, /initiated by submitting a charge in writing to magistrate/, /supervised by the Forty/, /tried by the dikasterion/, /has punishment for convicted of an assessable fine/, /has penalty of epobelia for failed prosecution/</div><div class="definitionFormal"><b>a kind  penalty&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/processes-dictionary/counter-indictment"> > Entry Page</a></div></div>`],

utor and defendant&gt;, &lt;Legal proceeding with non-assessable penalty&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/processes-dictionary/denunciation"> > Entry Page</a></div></div>`],

    [`<div class="terminologyEntry">    <div class="term">intentional wounding suit</div>    <div class="definitionNL"><b>Definition</b>: Indictment for intentional wounding with a weapon, supervised by Basileus, tried by the Council of the Areopagus, has punishment for convicted of exile and confiscation, with non-assessable penalty.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: indictment (preferred), non-assessable lawsuit (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: τραύματος ἐκ προνοίας γραφή (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant initiated by submitting a charge in writing to magistrate defendant summoned by plaintiff via prosklesis has penalty of 1000 drachmas for failed prosecution for intentional wounding with a weapon supervised by Basileus tried by the Council of the Areopagus has punishment for convicted of exile and confiscation with non-assessable penalty&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /with non-assessable penalty/, /brought forward by anyone who wishes/, /with a prosecutor and defendant/, /initiated by submitting a charge in writing to magistrate/, /defendant summoned by plaintiff via prosklesis/, /has penalty of 1000 drachmas for failed prosecution/, /for intentional wounding with a weapon/, /supervised by Basileus/, /tried by the Council of the Areopagus/, /has punishment for convicted of exile and confiscation/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant initiated by submitting a charge in writing to magistrate defendant summoned b     [`<div class="terminologyEntry">    <div class="term">private lawsuit</div>    <div class="definitionNL"><b>Definition</b>: Lawsuit brought forward by the injured party or a guardian, with a prosecutor and defendant.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: lawsuit (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hyponym(s)</u>: battery suit (preferred), counter-indictment (preferred), defamation suit (preferred), false witness suit (preferred), suit for a dowry (preferred), suit for acts of violence (preferred), suit for damages (preferred), suit for deposit recovery (preferred), suit for ejectment (preferred), suit for mining damages (preferred), suit for recovery (preferred), suit for theft (preferred), suit over a guardianship (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: δίκαι ἴδιαι (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding brought forward by the injured party or a guardian with a prosecutor and defendant&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /brought forward by the injured party or a guardian/, /with a prosecutor and defendant/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal proceeding&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/processes-dictionary/private-lawsuit"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">public lawsuit</div>    <div class="definitionNL"><b>Definition</b>: Lawsuit brought forward by anyone who wishes, with a prosecutor and defendant.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: lawsuit (preferred),</i></div>    <div class="textMediumMarginBlue"><i><u>hyponym(s)</u>: denunciation (preferred), impeachment for maltreatment (preferred), impeachment for treason (preferred), indictment (preferred), indictment for confiscation (preferred), presentation (preferred), report (preferred), review (preferred), scrutiny (preferred), scrutiny of pension recipients (preferred), scrutiny of speakers (preferred), summary arrest (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: δίκαι δημόσιαι (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /brought forward by anyone who wishes/, /with a prosecutor and defendant/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal proceeding&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/processes-dictionary/public-lawsuit"> > Entry Page</a></div></div>`],
    [`<div class="terminologyEntry">    <div class="term">report</div>    <div class="definitionNL"><b>Definition</b>: Public lawsuit for subversion or treason or bribery of public speakers, initiated by investigation by the Council of the Areopagus, tried by the dikasterion, has punishment for convicted of a penal assessment, has no penalty for failed prosecution, with assessable penalty through timesis.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: assessable lawsuit (preferred), public lawsuit (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: ἀπόφασις (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant for subversion or treason or bribery of public speakers initiated by investigation by the Council of the Areopagus tried by the dikasterion has punishment for convicted of a penal assessment has no penalty for failed prosecution with assessable penalty through timesis&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /with assessable penalty through timesis/, /brought forward by anyone who wishes/, /with a prosecutor and defendant/, /for subversion or treason or bribery of public speakers/, /initiated by investigation by the Council of the Areopagus/, /tried by the dikasterion/, /has punishment for convicted of a penal assessment/, /has no penalty for failed prosecution/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant&gt;, &lt;Legal proceeding with assessable penalty through timesis&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a hr     [`<div class="terminologyEntry">    <div class="term">review</div>    <div class="definitionNL"><b>Definition</b>: Public lawsuit to evaluate term in office, initiated automatically after term of magistrate, supervised by Euthynoi, tried by the dikasterion, has punishment for convicted of tenfold damages, with non-assessable penalty.</div>    <div class="textMediumMarginBlue"><i><u>hypernym(s)</u>: non-assessable lawsuit (preferred), public lawsuit (preferred),</i></div>    <div class="textMediumMargin"><b>Status</b>: preferred</div></div><div class="terminologyEntry">    <div class="textMediumMarginBlue"><b>Equivalent(s)</b>: </div>    <div class="textMediumMarginBlue">- grc: εὔθυναι (preferred)</div></div><div class="conceptEntry">    <div class="concept"><b>Concept</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant to evaluate term in office initiated automatically after term of magistrate supervised by Euthynoi tried by the dikasterion has punishment for convicted of tenfold damages with non-assessable penalty&gt;</div>    <div class="definitionFormal"><b>essential characteristic(s)</b>:  /is an entire legal process/, /with non-assessable penalty/, /brought forward by anyone who wishes/, /with a prosecutor and defendant/, /to evaluate term in office/, /initiated automatically after term of magistrate/, /supervised by Euthynoi/, /tried by the dikasterion/, /has punishment for convicted of tenfold damages/</div><div class="definitionFormal"><b>a kind of</b>: &lt;Legal proceeding brought forward by anyone who wishes with a prosecutor and defendant&gt;, &lt;Legal proceeding with non-assessable penalty&gt;</div></div></div><div class="otherEntry"></div></div><div class="concept-entry"><div class="term"><a href="/processes-dictionary/review"> > Entry Page</a></div></div>`],

function show_selected() {
    var selector = document.getElementById('idTerm');
    var champ = dictionnaire[selector[selector.selectedIndex].value][0];
    document.getElementById('display').innerHTML = champ;
}
document.getElementById('idTerm').addEventListener('change', show_selected);

searchBox = document.querySelector("#searchBox");
entries = document.querySelector("#idTerm");
var when = "keyup"; //You can change this to keydown, keypress or change

searchBox.addEventListener("keyup", function (e) {
    var text = e.target.value;
    var options = entries.options;
    for (var i = 0; i < options.length; i++) {
        var option = options[i];
        var optionText = option.text;
        var lowerOptionText = optionText.toLowerCase();
        var lowerText = text.toLowerCase();
        var regex = new RegExp("^" + text, "i");
        var match = optionText.match(regex);
        var contains = lowerOptionText.indexOf(lowerText) != -1;
        if (match || contains) {
            option.selected = true;
            show_selected();
            return;
        }
        searchBox.selectedIndex = 0;
    }
});

</script>
